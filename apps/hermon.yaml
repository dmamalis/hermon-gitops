apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermon
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: git@github.com:dmamalis/hermon-ingest.git
      targetRevision: main
      path: deploy/charts/hermon
      helm:
        valueFiles:
          - $values/hermon/values/k3s-lab.yaml
    - repoURL: git@github.com:dmamalis/hermon-gitops.git
      targetRevision: main
      ref: values
      path: hermon/support
  destination:
    server: https://kubernetes.default.svc
    namespace: hermon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
