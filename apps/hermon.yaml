apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermon
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:dmamalis/hermon-gitops.git
    targetRevision: main
    path: hermon/base
  destination:
    server: https://kubernetes.default.svc
    namespace: hermon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
